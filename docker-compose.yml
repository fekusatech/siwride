services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siwride_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      # Connection to the DB service below
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-siwride}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    # Mount the .env file dynamically if you have it on the server
    # Or rely completely on passing environment parameters here
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage:/var/www/html/storage

volumes:
  # Any other volumes you might need for storage or static files
  storage:
